# quant-cfg.yaml — runtime-supported Q8_0 modules for the Metal backend.
#
# The converter quantizes only the (family, projection) pairs listed here with
# `supported: true`.  Grow this list as fused Q8 Metal kernels land; a module
# stays `supported: false` until every decode and prefill path that consumes it
# has a fused Q8 kernel.
#
# Keys:
#   version     config schema version (currently 1)
#   group_size  Q8_0 block/group size; must match UOCR_Q8_GROUP_SIZE_DEFAULT
#   modules     ordered list of module specs
#     name         human-readable module id (stable, used in summaries)
#     family       TensorFamily enum name
#     projections  list of TensorProjection enum names this module covers
#     supported    whether the runtime can consume Q8_0 weights for this module
#
# Note: attention_qkv covers Q/K/V and attention_output covers O.  Both prefill
# and decode have fused Q8 kernels for Q/K/V and O projections.

version: 1
group_size: 64

modules:
  - name: token_embedding
    family: TOK_EMBED
    projections: [WEIGHT]
    supported: true

  - name: lm_head
    family: LM_HEAD
    projections: [WEIGHT]
    supported: true

  - name: attention_qkv
    family: LAYER_ATTN
    projections: [Q, K, V]
    supported: true

  - name: attention_output
    family: LAYER_ATTN
    projections: [O]
    supported: true

  - name: dense_mlp
    family: LAYER_DENSE_MLP
    projections: [GATE, UP, DOWN]
    supported: true

  - name: moe_shared
    family: MOE_SHARED
    projections: [GATE, UP, DOWN]
    supported: true

  - name: moe_routed_experts
    family: MOE_EXPERT
    projections: [GATE, UP, DOWN]
    supported: true

  # Vision modules are intentionally disabled until each fused Q8 Metal path is
  # implemented and QA'd end-to-end.  These entries make converter planning
  # explicit while preserving the current fp16 vision runtime.
  - name: visual_projector
    family: PROJECTOR
    projections: [WEIGHT]
    supported: true

  - name: clip_mlp
    family: VISION_CLIP
    projections: [VISION_MLP_FC1, VISION_MLP_FC2]
    supported: true

  - name: clip_attention
    family: VISION_CLIP
    projections: [VISION_ATTN_QKV, VISION_ATTN_O]
    supported: false

  - name: sam_mlp
    family: VISION_SAM
    projections: [VISION_MLP_FC1, VISION_MLP_FC2]
    supported: false

  - name: sam_attention
    family: VISION_SAM
    projections: [VISION_ATTN_QKV, VISION_ATTN_O]
    supported: false

  - name: sam_patch_embed
    family: VISION_SAM
    projections: [VISION_PATCH_EMBED]
    supported: false

  - name: sam_neck_convs
    family: VISION_SAM
    projections: [VISION_CONV_1X1, VISION_CONV_3X3]
    supported: false
